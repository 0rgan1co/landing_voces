<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Triangle "V" with voice bars inside -->
  <g transform="translate(0,5)">
    <!-- Triangle -->
    <polygon points="10,0 70,0 40,55" fill="#00C8FF"/>
    <!-- Voice bars inside triangle -->
    <rect x="30" y="18" width="2" height="12" rx="1" fill="#fff"/>
    <rect x="34" y="14" width="2" height="20" rx="1" fill="#fff"/>
    <rect x="38" y="12" width="2" height="24" rx="1" fill="#fff"/>
    <rect x="42" y="14" width="2" height="20" rx="1" fill="#fff"/>
    <rect x="46" y="18" width="2" height="12" rx="1" fill="#fff"/>
  </g>
  <!-- "OCES" text -->
  <text x="78" y="48" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="800" font-size="58" fill="#00C8FF" letter-spacing="-1">OCES</text>
</svg>
